name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_BIN: /usr/local/bin/godot
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q Godot_v4.7-stable_linux.x86_64.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot-real
          echo '#!/bin/bash' | sudo tee /usr/local/bin/godot
          echo 'exec /usr/local/bin/godot-real --headless "$@"' | sudo tee -a /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Initialize Godot project
        run: timeout 30 godot --headless --build-solutions || true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: GODOT_BIN=/usr/local/bin/godot dotnet test --verbosity normal
