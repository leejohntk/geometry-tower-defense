name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_BIN: /usr/local/bin/godot
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Godot
        run: |
          URL="https://github.com/godotengine/godot-builds/releases/download/4.7-stable"
          ZIP="Godot_v4.7-stable_mono_linux_x86_64.zip"
          DIR="Godot_v4.7-stable_mono_linux_x86_64"
          wget -q "$URL/$ZIP"
          unzip -q "$ZIP"
          sudo mv "$DIR"/GodotSharp /usr/local/bin/GodotSharp
          sudo mv "$DIR"/Godot_v4* /usr/local/bin/godot-real
          sudo chmod +x /usr/local/bin/godot-real
          printf '#!/bin/bash\nexec /usr/local/bin/godot-real --headless "$@"\n' | sudo tee /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test
